services:
  postgres:
    image: postgres:15
    container_name: klarpath_crm_postgres
    environment:
      POSTGRES_DB: klarpath_crm
      POSTGRES_USER: klarpath_user
      POSTGRES_PASSWORD: klarpath_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./databases/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U klarpath_user -d klarpath_crm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: klarpath_crm_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: klarpath_crm_mailhog
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI
    environment:
      MH_STORAGE: maildir
      MH_MAILDIR_PATH: /tmp/mailhog
    volumes:
      - mailhog_data:/tmp/mailhog

  backend:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: klarpath_crm_backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://klarpath_user:klarpath_password@postgres:5432/klarpath_crm
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      NODE_ENV: development # Next.js prefers 'development' or 'production'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: klarpath_crm_app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://klarpath_user:klarpath_password@postgres:5432/klarpath_crm
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  seed:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: klarpath_crm_seed
    command: sh -c "npm run seed"
    environment:
      DATABASE_URL: postgresql://klarpath_user:klarpath_password@postgres:5432/klarpath_crm
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  prisma-studio:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: klarpath_crm_studio
    command: npx prisma studio --port 5555 --browser none --schema ./schema.prisma
    ports:
      - "5555:5555"
    environment:
      DATABASE_URL: postgresql://klarpath_user:klarpath_password@postgres:5432/klarpath_crm
    depends_on:
      postgres:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: klarpath_crm_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@klarpath.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  dbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: klarpath_crm_dbeaver
    ports:
      - "8978:8978"
    depends_on:
      - postgres
    volumes:
      - ./docker/dbeaver/workspace:/opt/cloudbeaver/workspace
      - dbeaver_data:/opt/cloudbeaver/conf

volumes:
  postgres_data:
  redis_data:
  mailhog_data:
  pgadmin_data:
  dbeaver_data: